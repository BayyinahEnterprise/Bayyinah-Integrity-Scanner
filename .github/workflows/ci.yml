# -----------------------------------------------------------------------------
# Bayyinah — Continuous Integration
# -----------------------------------------------------------------------------
#
# Al-Baqarah 2:282: "And bring two witnesses from among your men."
#
# This workflow is the project's standing witness. Every push to `main` and
# every pull request runs it across Python 3.10 / 3.11 / 3.12 / 3.13. Each
# job completes the same five-step discipline the phase roadmap demanded:
#
#   1. install dependencies
#   2. regenerate the fixture corpus (fresh, deterministic)
#   3. run the full pytest suite
#   4. verify byte-identical PDF parity against `bayyinah_v0`
#   5. verify the public surface is additive-only
#
# A failure in any step fails the job — no silent-clean.
# -----------------------------------------------------------------------------

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install the package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Regenerate the fixture corpus
        run: python -m tests.make_test_documents

      - name: Run the full pytest suite
        run: pytest -q --strict-markers

      - name: Verify byte-identical PDF parity against bayyinah_v0
        run: |
          python - <<'PY'
          import bayyinah, bayyinah_v0
          from pathlib import Path
          mismatches = []
          fixtures = sorted(Path("tests/fixtures").rglob("*.pdf"))
          assert fixtures, "No PDF fixtures found"
          for f in fixtures:
              r_v0 = bayyinah_v0.scan_pdf(f)
              r_new = bayyinah.scan_pdf(f)
              v0_mechs = sorted(x.mechanism for x in r_v0.findings)
              new_mechs = sorted(x.mechanism for x in r_new.findings)
              if (v0_mechs != new_mechs
                  or abs(r_v0.integrity_score - r_new.integrity_score) > 1e-6
                  or r_v0.error != r_new.error):
                  mismatches.append((f.name, v0_mechs, new_mechs))
          assert not mismatches, f"PDF parity broken: {mismatches}"
          print(f"PDF parity: OK across {len(fixtures)} fixtures")
          PY

      - name: Verify additive-only public surface
        run: |
          python - <<'PY'
          import bayyinah
          # The set of symbols that must always be present. Items may be
          # added here, never removed. Enforcing this in CI is the
          # structural honesty of the additive-only invariant.
          required = {
              # Versioning
              "__version__",
              # Entry points (v0/v0.1 legacy + 1.0 format-agnostic addition)
              "scan_file", "scan_pdf",
              "format_text_report", "plain_language_summary",
              # Orchestrator + registry
              "ScanService", "default_pdf_registry", "default_registry",
              "AnalyzerRegistry", "AnalyzerRegistrationError", "BaseAnalyzer",
              # Analyzers
              "ZahirTextAnalyzer", "BatinObjectAnalyzer",
              "DocxAnalyzer", "HtmlAnalyzer", "XlsxAnalyzer",
              "PptxAnalyzer", "EmlAnalyzer", "CsvAnalyzer",
              "FallbackAnalyzer",
              # Phase 24 — video container decomposition.
              "VideoAnalyzer",
              # Phase 24 — audio container decomposition.
              "AudioAnalyzer",
              # Phase 25+ — cross-modal correlation post-processor.
              "CrossModalCorrelationEngine",
              # Phase 26+ — auditable mechanism registry (the single
              # public symbol that exposes the union of ZAHIR_MECHANISMS
              # ∪ BATIN_MECHANISMS, with module-import-time coherence
              # assertion against SEVERITY and TIER).
              "MECHANISM_REGISTRY",
              # Infrastructure
              "PDFClient", "FileRouter", "FileKind", "FileTypeDetection",
              "UnsupportedFileType", "UnknownFileType",
              "ReportFormatter", "TerminalReportFormatter",
              "JsonReportFormatter", "PlainLanguageFormatter",
              # Domain
              "Finding", "IntegrityReport", "SourceLayer",
              "compute_muwazana_score", "tamyiz_verdict",
              "apply_scan_incomplete_clamp",
              "Verdict", "VERDICT_DISCLAIMER",
              "VERDICT_SAHIH", "VERDICT_MUSHTABIH",
              "VERDICT_MUKHFI", "VERDICT_MUNAFIQ", "VERDICT_MUGHLAQ",
              "TOOL_NAME", "TOOL_VERSION",
              # Phase 21 safety limits
              "ScanLimits", "DEFAULT_LIMITS",
              "get_current_limits", "set_current_limits", "limits_context",
              # Exceptions
              "BayyinahError", "PDFParseError", "InvalidFindingError",
              "ScanError",
          }
          actual = set(bayyinah.__all__)
          missing = required - actual
          assert not missing, f"Public surface regressed (symbols removed): {missing}"
          for sym in required:
              assert hasattr(bayyinah, sym), f"{sym} listed in __all__ but not bound"
          print(f"Additive-only surface: OK ({len(actual)} symbols exported)")
          PY

      - name: Verify v0 / v0.1 reference modules unchanged
        run: |
          python - <<'PY'
          # Parity against the reference implementations is the central
          # invariant of the whole project. If someone has edited v0 or
          # v0.1, the refactor's honesty is already gone.
          import hashlib
          from pathlib import Path
          for name, expected in {
              "bayyinah_v0.py":   "87ba2ea48800ef616b303a25b01373d8",
              "bayyinah_v0_1.py": "035aa578de7470c9465922bee2632cd5",
          }.items():
              actual = hashlib.md5(Path(name).read_bytes()).hexdigest()
              assert actual == expected, (
                  f"{name} md5 drifted — expected {expected}, got {actual}. "
                  f"Additive-only invariant violated."
              )
          print("Reference modules: byte-identical to 0.1.0.")
          PY

  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build frontend
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build wheel + sdist
        run: python -m build

      - name: List built artifacts
        run: ls -la dist/

      - name: Upload dist/ artefacts
        uses: actions/upload-artifact@v4
        with:
          name: bayyinah-dist-${{ github.sha }}
          path: dist/
          retention-days: 14
